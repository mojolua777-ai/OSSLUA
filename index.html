    <style>

        .app {

            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; 
            padding: 20px;

        .symbol-container { height: 90px; width: 100%; display: flex; flex-direction: row; justify-content: center; align-items: center; margin: 10px 0; }
        .symbol-column { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 28px; height: 50px; margin: 0 4px; position: relative; }
        .dot { width: var(--dot-size); height: var(--dot-size); background: #111; border-radius: 50%; margin: 4px 0; transform: scale(0); }
        
        .grow .dot { animation: dotGrow 0.6s var(--ease-out-expo) forwards; }
        @keyframes dotGrow {
            0% { transform: scale(0) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }

        .basic-info { text-align: center; margin-bottom: 15px; opacity: 0; transition: 1s var(--ease-out-expo); transform: translateY(10px); }

        .m-core { font-size: 0.8rem; color: #999; margin-top: 8px; letter-spacing: 4px; }

        .category-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); 
            width: 100%; opacity: 0; transition: 0.8s var(--ease-out-expo); pointer-events: none;
            border-top: 1px solid var(--ui-border); border-bottom: 1px solid var(--ui-border); padding: 5px 0;
        }
        .category-grid.show { opacity: 1; pointer-events: auto; }
        
        .cat-btn { background: transparent; border: none; padding: 10px 0; font-size: 0.72rem; cursor: pointer; color: #bbb; text-align: center; transition: 0.3s; }
        .cat-btn.active { color: #000; font-weight: 600; }

        .detail-box { margin-top: 10px; width: 100%; min-height: 100px; text-align: left; padding: 10px 5px; opacity: 0; transition: opacity 0.4s ease; overflow-y: auto; max-height: 180px; }

        .detail-title { font-size: 0.85rem; color: #111; font-weight: 400; display: block; margin-bottom: 6px; border-left: 3px solid #111; padding-left: 10px; }

        .trigger-group { display: flex; flex-direction: column; align-items: center; margin-top: 25px; flex-shrink: 0; }
        .trigger-hint { font-size: 0.6rem; color: #ccc; letter-spacing: 3px; margin-bottom: 10px; }

        .footer { width: 100%; text-align: center; font-size: 0.5rem; color: #ddd; padding: 30px 0 10px 0; flex-shrink: 0; line-height: 1.8; }

    const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
    let curves = [];
    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; curves = []; for(let i=0; i<3; i++) curves.push(new Curve()); }
    class Curve {
        constructor() { this.reset(); }
        reset() {
            this.points = []; this.count = 5;
            for(let i=0; i<this.count; i++) this.points.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4});
        }
        update() { this.points.forEach(p => { p.x += p.vx; p.y += p.vy; if(p.x<0 || p.x>canvas.width) p.vx *= -1; if(p.y<0 || p.y>canvas.height) p.vy *= -1; }); }
        draw() {
            ctx.beginPath(); ctx.moveTo(this.points[0].x, this.points[0].y);
            for(let i=1; i<this.count-2; i++) {
                const xc = (this.points[i].x + this.points[i+1].x)/2, yc = (this.points[i].y + this.points[i+1].y)/2;
                ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, xc, yc);
            }
            ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1.2; ctx.stroke();
        }
    }
    function render() { ctx.clearRect(0,0,canvas.width, canvas.height); curves.forEach(c=>{c.update(); c.draw();}); requestAnimationFrame(render); }
    window.addEventListener('resize', initCanvas); initCanvas(); render();

    let currentMishi = null;

    function resetUI() {
        const info = document.getElementById('infoArea');
        const grid = document.getElementById('catGrid');
        const detail = document.getElementById('detailBox');
        [info, grid, detail].forEach(el => el.classList.remove('show'));
        document.getElementById('detailContent').innerHTML = '';
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
    }

    function mishiCast() {
        if(window.navigator.vibrate) window.navigator.vibrate(12);
        resetUI();
        const area = document.getElementById('symbolArea');
        const info = document.getElementById('infoArea');
        const grid = document.getElementById('catGrid');
        area.classList.remove('grow');
        currentMishi = MISHI_DB[Math.floor(Math.random() * MISHI_DB.length)];
        area.innerHTML = '';
        currentMishi.symbol.forEach((type, i) => {
            const col = document.createElement('div');
            col.className = 'symbol-column';
            col.style.animationDelay = `${i * 0.04}s`; 
            col.innerHTML = type === 0 ? '<div class="dot"></div>' : '<div class="dot"></div><div class="dot"></div>';
            area.appendChild(col);
        });
        requestAnimationFrame(() => {
            void area.offsetWidth; 
            area.classList.add('grow');
            setTimeout(() => {
                document.getElementById('mName').innerText = currentMishi.name;
                document.getElementById('mCore').innerText = currentMishi.core;
                info.classList.add('show');
            }, 800);
            setTimeout(() => grid.classList.add('show'), 1400);
        });
    }

    function showDetail(key, event) {
        if(!currentMishi) return;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        const box = document.getElementById('detailBox'), content = document.getElementById('detailContent');
        box.classList.remove('show');
        setTimeout(() => {
            const labels = {love:'爱情', money:'金钱', work:'事业', people:'人际', health:'健康', advice:'建议', place:'位置', assoc:'物品', person:'人物', spirit:'魔法'};
            content.innerHTML = `<span class="detail-title">【${labels[key]}】</span><div>${currentMishi[key]}</div>`;
            box.classList.add('show');
        }, 150);
    }
