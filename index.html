        .app {

        }

        .symbol-container.show { opacity: 1; }

            width: 28px; height: 50px; margin: 0 4px;
        }
        .dot { width: var(--dot-size); height: var(--dot-size); background: #111; border-radius: 50%; margin: 4px 0; }

        .basic-info { text-align: center; margin-bottom: 15px; opacity: 0; transition: opacity 1.2s var(--ease-out-expo), transform 1.2s var(--ease-out-expo); transform: translateY(10px); }

        .m-core { font-size: 0.8rem; color: #999; margin-top: 8px; letter-spacing: 4px; }

            display: grid; grid-template-columns: repeat(5, 1fr); 
            width: 100%; opacity: 0; transition: opacity 0.8s var(--ease-out-expo); pointer-events: none;

        .category-grid.show { opacity: 1; pointer-events: auto; }

            background: transparent; border: none; padding: 10px 0; font-size: 0.72rem;
            cursor: pointer; color: #bbb; text-align: center; transition: color 0.3s;
        }
        .cat-btn.active { color: #000; font-weight: 400; }

            margin-top: 10px; width: 100%; min-height: 80px;

        .detail-title { font-size: 0.85rem; color: #111; font-weight: 400; display: block; margin-bottom: 6px; border-left: 3px solid #111; padding-left: 10px; }

        }
        .trigger-hint { font-size: 0.6rem; color: #ccc; letter-spacing: 3px; margin-bottom: 10px; }

        symbolArr.forEach((type, colIndex) => {
            const curColX = x + colIndex * cGap;
            if (type === 0) { ctx.beginPath(); ctx.arc(curColX, y, dSize / 2, 0, Math.PI * 2); ctx.fill(); } 
            else { 
                ctx.beginPath(); ctx.arc(curColX, y - dGap / 2, dSize / 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(curColX, y + dGap / 2, dSize / 2, 0, Math.PI * 2); ctx.fill();
            }
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bgSymbols.timer++;
        if (bgSymbols.timer > bgSymbols.spawnRate && bgSymbols.pool.length < bgSymbols.maxCount) {
            bgSymbols.pool.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                code: MISHI_CODES[Math.floor(Math.random() * MISHI_CODES.length)],
                scale: 0.5 + Math.random() * 1.5, life: 0, 
                duration: 1200 + Math.random() * 800, 
                targetOpacity: 0.03 + Math.random() * 0.03 
            });
            bgSymbols.timer = 0;
        }
        for (let i = bgSymbols.pool.length - 1; i >= 0; i--) {
            const s = bgSymbols.pool[i]; s.life++;
            const progress = (s.life / s.duration) * Math.PI - Math.PI / 2;
            const opaFactor = Math.cos(progress); 
            if (s.life > s.duration) { bgSymbols.pool.splice(i, 1); continue; }
            if (opaFactor > 0) drawSymbol(ctx, s.x, s.y, s.code, opaFactor * s.targetOpacity, s.scale);
        }
        requestAnimationFrame(animate);
    }

    function drawHorizontalSymbol(symbolArr) {
        const area = document.getElementById('symbolArea');
        area.innerHTML = ''; 
        symbolArr.forEach((type, index) => {
            const col = document.createElement('div'); 
            col.className = 'symbol-column';
            col.style.opacity = '0';
            col.style.transition = `opacity 1s var(--ease-out-expo) ${index * 0.1}s`;
            col.innerHTML = type === 0 ? '<div class="dot"></div>' : '<div class="dot"></div><div class="dot"></div>';
            area.appendChild(col);
            void col.offsetWidth;
            col.style.opacity = '1';
        });
    }

    function mishiCast() {
        if(window.navigator.vibrate) window.navigator.vibrate(8);
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        ['symbolArea', 'infoArea', 'catGrid', 'detailBox'].forEach(id => {
            document.getElementById(id).classList.remove('show');
        });

        currentMishi = MISHI_DB[Math.floor(Math.random() * MISHI_DB.length)];
        const nameEl = document.getElementById('mName');
        const coreEl = document.getElementById('mCore');
        const areaEl = document.getElementById('symbolArea');

        setTimeout(() => {
            areaEl.innerHTML = '';
            nameEl.innerText = "";
            coreEl.innerText = "";
            drawHorizontalSymbol(currentMishi.symbol);
            areaEl.classList.add('show');
            setTimeout(() => {
                nameEl.innerText = currentMishi.name;
                coreEl.innerText = currentMishi.core;
                document.getElementById('infoArea').classList.add('show');
            }, 800);
            setTimeout(() => {
                document.getElementById('catGrid').classList.add('show');
            }, 1600);
        }, 400);
    }

    function showDetail(key, event) {
        if(!currentMishi) return;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        const box = document.getElementById('detailBox'), content = document.getElementById('detailContent');
        box.classList.remove('show');
        setTimeout(() => {
            const labels = {love:'爱情', money:'金钱', work:'事业', people:'人际', health:'健康', advice:'建议', place:'位置', assoc:'物品', person:'人物', spirit:'神秘'};
            content.innerHTML = `<div class="detail-title">【${labels[key]}】</div><div>${currentMishi[key]}</div>`;
            box.classList.add('show');
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 150);
    }

    window.addEventListener('resize', init);
    init(); animate();
</script>
</body>
</html>
